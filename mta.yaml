_schema-version: 3.3.0
ID: DataSphereCV
description: A simple CAP project.
version: 1.0.0
modules:
- name: DataSphereCV-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: hdi_db
  - name: uaa_DataSphereCV
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: db
  type: hdb
  path: gen/db
  requires:
  - name: hdi_db
    properties:
      TARGET_CONTAINER: ~{hdi-container-name}
  - name: cross-container-service-1
    group: SERVICE_REPLACEMENTS
    properties:
      key: ServiceName_1
      service: ~{the-service-name}
- name: DataSphereCV-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: DataSphereCV-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - viewrepsalesagcy.zip
      name: viewrepsalesagcy
      target-path: resources/
    - artifacts:
      - viewcustomairport.zip
      name: viewcustomairport
      target-path: resources/
- name: viewmapairports
  type: html5
  path: app/view_map_airports
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: viewrepsalesagcy
  type: html5
  path: app/view_rep_sales_agcy
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: DataSphereCV-destination-content
  type: com.sap.application.content
  requires:
  - name: DataSphereCV-destination-service
    parameters:
      content-target: true
  - name: DataSphereCV-repo-host
    parameters:
      service-key:
        name: DataSphereCV-repo-host-key
  - name: uaa_DataSphereCV
    parameters:
      service-key:
        name: uaa_DataSphereCV-key
  parameters:
    content:
      instance:
        destinations:
        - Name: dataspherecvapprouter_DataSphereCV_repo_host
          ServiceInstanceName: DataSphereCV-html5-service
          ServiceKeyName: DataSphereCV-repo-host-key
          sap.cloud.service: dataspherecvapprouter
        - Authentication: OAuth2UserTokenExchange
          Name: dataspherecvapprouter_uaa_DataSphereCV
          ServiceInstanceName: DataSphereCV-xsuaa-service
          ServiceKeyName: uaa_DataSphereCV-key
          sap.cloud.service: dataspherecvapprouter
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: viewcustomairport
  type: html5
  path: app/view_custom_airport
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: hdi_db
  type: com.sap.xs.hdi-container
  properties:
    hdi-container-name: ${service-name}
- name: cross-container-service-1
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: CROSS_SCHEMA_SFLIGHT
  properties:
    the-service-name: ${service-name}
- name: DataSphereCV-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: DataSphereCV-html5-service
    service-plan: app-host
- name: DataSphereCV-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: DataSphereCV-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: uaa_DataSphereCV
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: DataSphereCV-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
